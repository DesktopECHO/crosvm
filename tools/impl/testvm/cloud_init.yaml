## template: jinja
#cloud-config
#
# Sets up the aarch64 test VM on Asahi Fedora Remix.
# Debian/apt-get references replaced with Fedora/dnf equivalents.
# x86_64 conditional paths removed.

users:
  - name: crosvm
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: False
    shell: /bin/bash
    # Hashed password is 'crosvm'
    passwd: $6$rounds=4096$os6Q9Ok4Y9a8hKvG$EwQ1bbS0qd4IJyRP.bnRbyjPbSS8BwxEJh18PfhsyD0w7a4GhTwakrmYZ6KuBoyP.cSjYYSW9wYwko4oCPoJr.
    ssh_authorized_keys:
      - ssh-rsa  crosvm@localhost
    groups: kvm, disk, tty

preserve_hostname: true

# Runtime dependencies of crosvm binaries (Fedora package names)
packages:
  - binutils
  - e2fsprogs
  - gcc
  - libavcodec-free       # ffmpeg runtime codec library
  - libcap
  - dbus-libs
  - libdrm
  - libepoxy              # epoxy runtime library
  - openssl-libs
  - libva
  - libwayland-client     # Wayland client runtime library
  - libX11
  - libXext
  - nasm
  - nmap-ncat
  - rsync

runcmd:
  # Append arch to hostname to make the VM easier to identify.
  - echo "testvm-$(arch)" > /etc/hostname
  - echo 127.0.0.1 testvm-$(arch) >> /etc/hosts
  - mkdir /var/empty

  # Install cargo-nextest using prebuilt aarch64 binary and validate checksum.
  - curl -LsSf https://get.nexte.st/0.9.96/linux-arm | tar zxf - -C /usr/bin
  - echo "dcf773f27abaa13d8aba20c0e448c3ab6e09785ca26e1c8ce7ebdb224d10f79d /usr/bin/cargo-nextest" | sha256sum -c -

  # Enable core dumps for debugging crashes
  - echo "* soft core unlimited" > /etc/security/limits.conf

  # Trim some fat
  - [dnf, remove, --assumeyes, vim-enhanced, grub2-efi-aa64]
  - [dnf, autoremove, --assumeyes]
  - [dnf, clean, all]
  - [rm, -rf, /var/cache/dnf]

  # Fill empty space with zeros so the image can be sparsified.
  - [dd, if=/dev/zero, of=/mytempfile]
  - [rm, /mytempfile]

  # Shut down after first-boot setup is done.
  - [poweroff]
